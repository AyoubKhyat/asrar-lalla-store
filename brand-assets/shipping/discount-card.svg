<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 200" fill="none">
  <!-- Discount/Referral Card -->
  <!-- Print: 85mm × 55mm, 300dpi -->

  <defs>
    <linearGradient id="discGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5FA2"/>
      <stop offset="100%" stop-color="#FF85B8"/>
    </linearGradient>
  </defs>

  <rect width="340" height="200" rx="12" fill="url(#discGrad)"/>

  <!-- Pattern overlay -->
  <g opacity="0.1">
    <circle cx="50" cy="30" r="20" fill="white"/>
    <circle cx="300" cy="170" r="30" fill="white"/>
    <circle cx="280" cy="40" r="15" fill="white"/>
  </g>

  <!-- Content -->
  <text x="170" y="42" font-family="'Outfit', sans-serif" font-weight="700" font-size="9" letter-spacing="2" fill="white" opacity="0.8" text-anchor="middle">ASRAR LALLA</text>

  <text x="170" y="80" font-family="'Outfit', sans-serif" font-weight="800" font-size="36" fill="white" text-anchor="middle">-15%</text>

  <text x="170" y="105" font-family="'DM Sans', sans-serif" font-size="11" fill="white" opacity="0.9" text-anchor="middle">sur votre prochaine commande</text>

  <!-- Code -->
  <rect x="105" y="118" width="130" height="32" rx="16" fill="white" opacity="0.2"/>
  <text x="170" y="140" font-family="'Outfit', sans-serif" font-weight="800" font-size="16" fill="white" text-anchor="middle">MERCI15</text>

  <text x="170" y="170" font-family="'DM Sans', sans-serif" font-size="8" fill="white" opacity="0.7" text-anchor="middle">Valable 30 jours · Non cumulable</text>

  <text x="170" y="190" font-family="'DM Sans', sans-serif" font-size="7" fill="white" opacity="0.6" text-anchor="middle">asrarlalla.ma</text>
</svg>
