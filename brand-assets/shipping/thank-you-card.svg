<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- Thank You Card — Front -->
  <!-- Print: 100mm × 70mm, 300dpi, thick card stock 350gsm -->
  <!-- Finish: Soft-touch matte, spot UV on logo and "Merci" -->

  <rect width="400" height="280" rx="16" fill="white"/>
  <rect width="400" height="280" rx="16" fill="none" stroke="#FFCFE1" stroke-width="1"/>

  <!-- Top gradient accent -->
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5FA2"/>
      <stop offset="100%" stop-color="#FF85B8"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="400" height="6" rx="3" fill="url(#cardGrad)"/>

  <!-- Flower accent top-right -->
  <g transform="translate(340, 20) scale(0.3)" opacity="0.15">
    <ellipse cx="32" cy="14" rx="9" ry="16" fill="#FF5FA2"/>
    <ellipse cx="32" cy="50" rx="9" ry="16" fill="#FF5FA2"/>
    <ellipse cx="14" cy="32" rx="16" ry="9" fill="#FF5FA2"/>
    <ellipse cx="50" cy="32" rx="16" ry="9" fill="#FF5FA2"/>
    <circle cx="32" cy="32" r="7" fill="#FF5FA2"/>
  </g>

  <!-- Main content -->
  <text x="40" y="55" font-family="'Outfit', sans-serif" font-weight="800" font-size="32" fill="#FF5FA2">Merci 🌸</text>

  <text x="40" y="90" font-family="'DM Sans', sans-serif" font-size="11" fill="#6B6B6B" line-height="1.7">
    <tspan x="40" dy="0">Votre commande a été préparée avec amour.</tspan>
    <tspan x="40" dy="18">Chaque produit que vous tenez entre vos mains</tspan>
    <tspan x="40" dy="18">porte en lui des siècles de beauté marocaine.</tspan>
  </text>

  <text x="40" y="158" font-family="'DM Sans', sans-serif" font-size="10" fill="#1A1A1A" font-weight="500">Prenez soin de vous,</text>
  <text x="40" y="174" font-family="'Outfit', sans-serif" font-size="11" fill="#FF5FA2" font-weight="700">L'équipe ASRAR LALLA</text>

  <!-- Divider -->
  <line x1="40" y1="195" x2="360" y2="195" stroke="#FFEAF3" stroke-width="1"/>

  <!-- Contact info -->
  <text x="40" y="218" font-family="'DM Sans', sans-serif" font-size="9" fill="#9CA3AF">💬 Un souci ? Écrivez-nous sur WhatsApp</text>
  <text x="40" y="236" font-family="'DM Sans', sans-serif" font-size="9" fill="#9CA3AF">📸 Partagez votre unboxing : @asrarlalla</text>

  <!-- Promo code -->
  <rect x="40" y="250" width="200" height="22" rx="11" fill="#FFEAF3"/>
  <text x="140" y="265" font-family="'Outfit', sans-serif" font-weight="700" font-size="9" fill="#FF5FA2" text-anchor="middle">-15% PROCHAINE COMMANDE : MERCI15</text>
</svg>
