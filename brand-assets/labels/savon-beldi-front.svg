<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" fill="none">
  <!-- Savon Beldi — Front Label (circular for jar lid) -->
  <!-- Print: 55mm diameter circle, 300dpi -->
  <!-- Stock: White matte vinyl, die-cut circle -->

  <!-- Outer ring -->
  <circle cx="110" cy="110" r="108" fill="white" stroke="#FFEAF3" stroke-width="1"/>
  <circle cx="110" cy="110" r="100" fill="none" stroke="#FFCFE1" stroke-width="0.5"/>

  <!-- Logo flower small -->
  <g transform="translate(93, 28) scale(0.4)">
    <ellipse cx="32" cy="14" rx="9" ry="16" fill="#FF5FA2" opacity="0.9"/>
    <ellipse cx="32" cy="50" rx="9" ry="16" fill="#FF5FA2" opacity="0.9"/>
    <ellipse cx="14" cy="32" rx="16" ry="9" fill="#FF5FA2" opacity="0.9"/>
    <ellipse cx="50" cy="32" rx="16" ry="9" fill="#FF5FA2" opacity="0.9"/>
    <circle cx="32" cy="32" r="6" fill="#FF5FA2"/>
    <circle cx="32" cy="32" r="3" fill="#FFCFE1"/>
  </g>

  <!-- Brand -->
  <text x="110" y="65" font-family="'Outfit', sans-serif" font-weight="700" font-size="8" letter-spacing="2" fill="#1A1A1A" text-anchor="middle">ASRAR LALLA</text>

  <!-- Dots -->
  <circle cx="100" cy="74" r="1" fill="#FFCFE1"/>
  <circle cx="110" cy="74" r="1" fill="#FF5FA2"/>
  <circle cx="120" cy="74" r="1" fill="#FFCFE1"/>

  <!-- Product name -->
  <text x="110" y="100" font-family="'Outfit', sans-serif" font-weight="800" font-size="18" fill="#1A1A1A" text-anchor="middle">SAVON</text>
  <text x="110" y="122" font-family="'Outfit', sans-serif" font-weight="800" font-size="18" fill="#1A1A1A" text-anchor="middle">BELDI</text>

  <!-- Subtitle -->
  <text x="110" y="142" font-family="'Outfit', sans-serif" font-weight="500" font-size="10" fill="#FF5FA2" text-anchor="middle">NATUREL</text>

  <!-- Arabic -->
  <text x="110" y="162" font-family="'Amiri', serif" font-size="13" fill="#9CA3AF" text-anchor="middle">صابون بلدي</text>

  <!-- Weight -->
  <rect x="82" y="172" width="56" height="20" rx="10" fill="#FFEAF3"/>
  <text x="110" y="186" font-family="'Outfit', sans-serif" font-weight="600" font-size="9" fill="#FF5FA2" text-anchor="middle">200g</text>

  <!-- Bottom -->
  <text x="110" y="206" font-family="'DM Sans', sans-serif" font-size="5.5" fill="#9CA3AF" text-anchor="middle">100% NATUREL · MAROC 🇲🇦</text>
</svg>
