<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- ASRAR LALLA Monogram — AL intertwined -->
  <!-- Usage: tags, stickers, embossing, watermark -->

  <circle cx="32" cy="32" r="30" fill="none" stroke="#FFCFE1" stroke-width="1"/>
  <circle cx="32" cy="32" r="27" fill="none" stroke="#FFEAF3" stroke-width="0.5"/>

  <!-- A letter -->
  <path d="M20 48 L32 16 L37 28" stroke="#FF5FA2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="24" y1="38" x2="35" y2="38" stroke="#FF5FA2" stroke-width="2" stroke-linecap="round"/>

  <!-- L letter -->
  <path d="M30 16 L30 48 L44 48" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Decorative dots -->
