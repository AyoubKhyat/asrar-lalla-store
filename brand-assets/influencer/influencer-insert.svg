  <rect x="0" y="0" width="400" height="6" rx="3" fill="url(#insGrad)"/>

  <!-- Logo -->
  <text x="200" y="45" font-family="'Outfit', sans-serif" font-weight="700" font-size="14" letter-spacing="3" fill="#FF5FA2" text-anchor="middle">ASRAR LALLA</text>

  <!-- Greeting -->
  <text x="200" y="85" font-family="'Outfit', sans-serif" font-weight="800" font-size="24" fill="#1A1A1A" text-anchor="middle">Salam belle 🌸</text>

  <!-- Body text -->
  <text x="40" y="120" font-family="'DM Sans', sans-serif" font-size="11" fill="#6B6B6B" line-height="1.7">
