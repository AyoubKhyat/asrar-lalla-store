<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" fill="none">
  <!-- Influencer Insert Card — A6 size (105mm × 148mm) -->
  <!-- Included in PR packages only -->
  <!-- Print: 300dpi, 350gsm silk card stock -->

  <rect width="400" height="560" rx="16" fill="white"/>
  <rect width="400" height="560" rx="16" fill="none" stroke="#FFCFE1" stroke-width="1"/>

  <!-- Top gradient -->
  <defs>
    <linearGradient id="insGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5FA2"/>
      <stop offset="100%" stop-color="#FF85B8"/>
