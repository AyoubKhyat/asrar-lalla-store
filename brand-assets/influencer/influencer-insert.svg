    <tspan x="40" dy="16">🧴 Crème de Rose Grand Format (100ml)</tspan>
    <tspan x="40" dy="16">🫧 Savon Beldi Naturel (200g)</tspan>
    <tspan x="40" dy="16">💧 Huile de Beauté Naturelle (30ml)</tspan>
    <tspan x="40" dy="16">👁️ Khôl Traditionnel</tspan>
    <tspan x="40" dy="16">💋 Baume à Lèvres Glowy</tspan>
    <tspan x="40" dy="16">💆‍♀️ Shampooing aux Herbes (250ml)</tspan>
  </text>

  <line x1="40" y1="360" x2="360" y2="360" stroke="#FFEAF3" stroke-width="1"/>

  <!-- Collab info -->
  <text x="40" y="388" font-family="'Outfit', sans-serif" font-weight="700" font-size="12" fill="#FF5FA2">VOTRE CODE EXCLUSIF :</text>

  <rect x="40" y="400" width="320" height="44" rx="22" fill="#FFEAF3"/>
  <text x="200" y="428" font-family="'Outfit', sans-serif" font-weight="800" font-size="20" fill="#FF5FA2" text-anchor="middle">[VOTRE_PRENOM]15</text>

  <text x="40" y="466" font-family="'DM Sans', sans-serif" font-size="9" fill="#6B6B6B">
    <tspan x="40" dy="0">→ -15% pour votre communauté</tspan>
    <tspan x="40" dy="15">→ Valable 30 jours, utilisations illimitées</tspan>
    <tspan x="40" dy="15">→ Vous recevez 10% de chaque vente</tspan>
  </text>

  <line x1="40" y1="510" x2="360" y2="510" stroke="#FFEAF3" stroke-width="1"/>

  <!-- Contact -->
  <text x="200" y="535" font-family="'DM Sans', sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">💬 WhatsApp : +212 6 00 00 00 00 · 📸 @asrarlalla</text>
  <text x="200" y="550" font-family="'DM Sans', sans-serif" font-size="7" fill="#9CA3AF" text-anchor="middle">asrarlalla.ma</text>
