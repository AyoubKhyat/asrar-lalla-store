<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" fill="none">
  <!-- Instagram Feed Template 1: PRODUCT SHOWCASE -->
  <!-- Export at 1080×1080px, sRGB -->
  <!-- This is template structure — replace placeholder areas with product photos -->

  <!-- Background -->
  <rect width="1080" height="1080" fill="#FFF8FB"/>

  <!-- Top brand bar -->
  <rect x="0" y="0" width="1080" height="80" fill="white"/>
  <text x="540" y="50" font-family="'Outfit', sans-serif" font-weight="700" font-size="24" letter-spacing="4" fill="#FF5FA2" text-anchor="middle">ASRAR LALLA</text>

  <!-- Product photo area -->
  <rect x="80" y="120" width="920" height="620" rx="40" fill="#FFEAF3"/>
  <text x="540" y="440" font-family="'DM Sans', sans-serif" font-size="24" fill="#FFCFE1" text-anchor="middle">[PHOTO PRODUIT ICI]</text>

  <!-- Badge -->
  <rect x="120" y="160" width="160" height="44" rx="22" fill="#FF5FA2"/>
  <text x="200" y="188" font-family="'Outfit', sans-serif" font-weight="700" font-size="16" fill="white" text-anchor="middle">BEST SELLER</text>

  <!-- Bottom info section -->
  <rect x="0" y="780" width="1080" height="300" fill="white"/>

  <!-- Product name -->
  <text x="80" y="850" font-family="'Outfit', sans-serif" font-weight="800" font-size="42" fill="#1A1A1A">Eau de Rose Distillée</text>

  <!-- Arabic -->
  <text x="80" y="895" font-family="'Amiri', serif" font-size="28" fill="#9CA3AF">ماء الورد المقطر</text>

  <!-- Price -->
  <text x="80" y="955" font-family="'Outfit', sans-serif" font-weight="800" font-size="48" fill="#FF5FA2">15 DH</text>
  <text x="215" y="955" font-family="'Outfit', sans-serif" font-weight="500" font-size="28" fill="#9CA3AF" text-decoration="line-through">22 DH</text>

  <!-- CTA -->
  <rect x="700" y="910" width="300" height="60" rx="30" fill="#FF5FA2"/>
  <text x="850" y="948" font-family="'Outfit', sans-serif" font-weight="700" font-size="20" fill="white" text-anchor="middle">COMMANDER →</text>

  <!-- Dots decoration -->
  <circle cx="540" y="1040" r="4" fill="#FFCFE1"/>
  <circle cx="560" y="1040" r="4" fill="#FF5FA2"/>
  <circle cx="580" y="1040" r="4" fill="#FFCFE1"/>
</svg>
