<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 56" fill="none">
  <!-- ASRAR LALLA Primary Logo: Icon + Wordmark -->
  <!-- Usage: Website header, documents, horizontal placements -->
  <!-- Min width: 160px -->

  <!-- Flower Icon Mark -->
  <g transform="translate(0, 0)">
    <!-- Petals -->
    <ellipse cx="28" cy="16" rx="8" ry="14" fill="#FF5FA2" opacity="0.9"/>
    <ellipse cx="28" cy="40" rx="8" ry="14" fill="#FF5FA2" opacity="0.9"/>
    <ellipse cx="14" cy="28" rx="14" ry="8" fill="#FF5FA2" opacity="0.9"/>
    <ellipse cx="42" cy="28" rx="14" ry="8" fill="#FF5FA2" opacity="0.9"/>
    <!-- Diagonal petals -->
    <ellipse cx="17" cy="17" rx="6" ry="11" fill="#FF85B8" opacity="0.7" transform="rotate(-45 17 17)"/>
    <ellipse cx="39" cy="17" rx="6" ry="11" fill="#FF85B8" opacity="0.7" transform="rotate(45 39 17)"/>
    <ellipse cx="17" cy="39" rx="6" ry="11" fill="#FF85B8" opacity="0.7" transform="rotate(45 17 39)"/>
    <ellipse cx="39" cy="39" rx="6" ry="11" fill="#FF85B8" opacity="0.7" transform="rotate(-45 39 39)"/>
    <!-- Center -->
    <circle cx="28" cy="28" r="7" fill="#FF5FA2"/>
    <circle cx="28" cy="28" r="4" fill="#FFCFE1"/>
    <circle cx="26" cy="26" r="1.5" fill="white" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="72" y="24" font-family="'Outfit', 'Inter', 'Helvetica Neue', sans-serif" font-weight="700" font-size="18" letter-spacing="3" fill="#1A1A1A">ASRAR</text>
  <text x="155" y="24" font-family="'Outfit', 'Inter', 'Helvetica Neue', sans-serif" font-weight="700" font-size="18" letter-spacing="3" fill="#FF5FA2">LALLA</text>

  <!-- Tagline -->
  <text x="72" y="44" font-family="'DM Sans', 'Inter', sans-serif" font-weight="400" font-size="9" letter-spacing="1.5" fill="#9CA3AF">LA BEAUTÉ MAROCAINE, RÉINVENTÉE</text>
</svg>
