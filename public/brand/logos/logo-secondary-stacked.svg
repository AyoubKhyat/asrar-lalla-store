    <ellipse cx="28" cy="42" rx="7" ry="13" fill="#FF5FA2" opacity="0.9"/>
    <ellipse cx="14" cy="28" rx="13" ry="7" fill="#FF5FA2" opacity="0.9"/>
    <ellipse cx="42" cy="28" rx="13" ry="7" fill="#FF5FA2" opacity="0.9"/>
    <ellipse cx="17" cy="17" rx="5.5" ry="10" fill="#FF85B8" opacity="0.7" transform="rotate(-45 17 17)"/>
    <ellipse cx="39" cy="17" rx="5.5" ry="10" fill="#FF85B8" opacity="0.7" transform="rotate(45 39 17)"/>
    <ellipse cx="17" cy="39" rx="5.5" ry="10" fill="#FF85B8" opacity="0.7" transform="rotate(45 17 39)"/>
