<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" fill="none">
  <!-- Instagram Profile Avatar — 110x110px -->
  <!-- White flower on pink gradient circle -->

  <defs>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5FA2"/>
      <stop offset="100%" stop-color="#FF85B8"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="55" cy="55" r="55" fill="url(#avatarGrad)"/>

  <!-- White flower icon -->
  <g transform="translate(23, 23)">
    <ellipse cx="32" cy="14" rx="9" ry="16" fill="white" opacity="0.95"/>
    <ellipse cx="32" cy="50" rx="9" ry="16" fill="white" opacity="0.95"/>
    <ellipse cx="14" cy="32" rx="16" ry="9" fill="white" opacity="0.95"/>
    <ellipse cx="50" cy="32" rx="16" ry="9" fill="white" opacity="0.95"/>
    <ellipse cx="19" cy="19" rx="7" ry="12" fill="white" opacity="0.7" transform="rotate(-45 19 19)"/>
    <ellipse cx="45" cy="19" rx="7" ry="12" fill="white" opacity="0.7" transform="rotate(45 45 19)"/>
    <ellipse cx="19" cy="45" rx="7" ry="12" fill="white" opacity="0.7" transform="rotate(45 19 45)"/>
    <ellipse cx="45" cy="45" rx="7" ry="12" fill="white" opacity="0.7" transform="rotate(-45 45 45)"/>
    <circle cx="32" cy="32" r="9" fill="white"/>
    <circle cx="32" cy="32" r="5" fill="#FF5FA2" opacity="0.3"/>
  </g>
</svg>
