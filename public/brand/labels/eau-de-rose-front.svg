<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" fill="none">
  <!-- Eau de Rose — Front Label -->
  <!-- Print: 50mm × 80mm, 300dpi -->
  <!-- Stock: White matte waterproof vinyl -->
  <!-- Finish: Soft-touch matte + spot UV on logo -->

  <!-- Background -->
  <rect width="200" height="320" rx="12" fill="white"/>
  <rect x="0" y="0" width="200" height="4" rx="2" fill="#FF5FA2"/>

  <!-- Top decorative line -->
  <line x1="40" y1="30" x2="160" y2="30" stroke="#FFEAF3" stroke-width="0.5"/>

  <!-- Logo -->
  <g transform="translate(80, 40) scale(0.6)">
    <ellipse cx="32" cy="14" rx="9" ry="16" fill="#FF5FA2" opacity="0.9"/>
    <ellipse cx="32" cy="50" rx="9" ry="16" fill="#FF5FA2" opacity="0.9"/>
    <ellipse cx="14" cy="32" rx="16" ry="9" fill="#FF5FA2" opacity="0.9"/>
    <ellipse cx="50" cy="32" rx="16" ry="9" fill="#FF5FA2" opacity="0.9"/>
    <circle cx="32" cy="32" r="7" fill="#FF5FA2"/>
    <circle cx="32" cy="32" r="4" fill="#FFCFE1"/>
  </g>

  <!-- Brand name -->
  <text x="100" y="95" font-family="'Outfit', sans-serif" font-weight="700" font-size="10" letter-spacing="2.5" fill="#1A1A1A" text-anchor="middle">ASRAR LALLA</text>

  <!-- Decorative dots -->
  <circle cx="90" cy="108" r="1.5" fill="#FFCFE1"/>
  <circle cx="100" cy="108" r="1.5" fill="#FF5FA2"/>
  <circle cx="110" cy="108" r="1.5" fill="#FFCFE1"/>

  <!-- Decorative line -->
  <line x1="50" y1="120" x2="150" y2="120" stroke="#FFEAF3" stroke-width="0.5"/>

  <!-- Product name -->
  <text x="100" y="155" font-family="'Outfit', sans-serif" font-weight="800" font-size="20" letter-spacing="1" fill="#1A1A1A" text-anchor="middle">EAU DE ROSE</text>
  <text x="100" y="178" font-family="'Outfit', sans-serif" font-weight="600" font-size="14" letter-spacing="0.5" fill="#FF5FA2" text-anchor="middle">DISTILLÉE</text>

  <!-- Arabic name -->
  <text x="100" y="205" font-family="'Amiri', serif" font-size="16" fill="#9CA3AF" text-anchor="middle" direction="rtl">ماء الورد المقطر</text>

  <!-- Decorative line -->
  <line x1="60" y1="220" x2="140" y2="220" stroke="#FFEAF3" stroke-width="0.5"/>

  <!-- Subtitle -->
  <text x="100" y="245" font-family="'DM Sans', sans-serif" font-weight="400" font-size="8" fill="#9CA3AF" text-anchor="middle">TONIFIANT · HYDRATANT · ÉCLAT</text>

  <!-- Volume -->
  <rect x="72" y="262" width="56" height="24" rx="12" fill="#FFEAF3"/>
  <text x="100" y="278" font-family="'Outfit', sans-serif" font-weight="600" font-size="11" fill="#FF5FA2" text-anchor="middle">100 ml</text>

  <!-- Bottom decorative -->
  <line x1="40" y1="300" x2="160" y2="300" stroke="#FFEAF3" stroke-width="0.5"/>
  <text x="100" y="314" font-family="'DM Sans', sans-serif" font-weight="400" font-size="6" fill="#9CA3AF" text-anchor="middle">FABRIQUÉ AU MAROC 🇲🇦</text>
</svg>
